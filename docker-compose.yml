services:
  # SRE Agent application
  app:
    image: teluacr-ehdxa9d6ajacd6aw.azurecr.io/aiops-sre-agent:latest
    container_name: sre-agent-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8001}:8001"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sre-network
      - shared-network

networks:
  sre-network:
    driver: bridge
    name: sre-network
  shared-network:
    external: true
