<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AION · Self-Healing Approval Demo</title>
  <!-- Official Adaptive Cards renderer: renders the exact card JSON the backend produces,
       including the interactive Approve/Reject Action.Submit buttons. -->
  <script src="https://unpkg.com/adaptivecards@3.0.4/dist/adaptivecards.min.js"></script>
  <!-- Render the assistant's markdown (tables, bold, lists) into clean HTML. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <style>
    :root { --bg:#f5f5f7; --panel:#fff; --brand:#5b5fc7; --muted:#616161; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
           background:var(--bg); color:#242424; }
    .app { max-width:720px; margin:0 auto; min-height:100vh; background:var(--panel);
           display:flex; flex-direction:column; box-shadow:0 0 24px rgba(0,0,0,.06); }
    header { display:flex; align-items:center; gap:12px; padding:14px 18px;
             border-bottom:1px solid #eee; position:sticky; top:0; background:var(--panel); z-index:2; }
    .avatar { width:36px; height:36px; border-radius:50%; background:var(--brand); color:#fff;
              display:flex; align-items:center; justify-content:center; font-weight:700; }
    header h1 { font-size:15px; margin:0; } header .sub { font-size:12px; color:var(--muted); }
    .toolbar { margin-left:auto; display:flex; gap:8px; }
    button.tool { border:1px solid #d0d0d5; background:#fafafa; border-radius:8px; padding:7px 12px;
                  font-size:13px; cursor:pointer; }
    button.tool:hover { background:#f0f0f5; }
    button.tool:disabled { opacity:.5; cursor:not-allowed; }
    #feed { padding:18px; display:flex; flex-direction:column; gap:14px; flex:1; }
    .bubble { align-self:flex-start; max-width:92%; }
    .card-wrap { background:#fff; border:1px solid #e6e6ea; border-radius:12px; padding:14px 16px;
                 box-shadow:0 1px 2px rgba(0,0,0,.05); }
    .stamp { font-size:11px; color:var(--muted); margin:2px 4px; }
    .note { font-size:12px; color:var(--muted); text-align:center; padding:6px; }
    .msg { max-width:80%; padding:9px 13px; border-radius:14px; font-size:14px; line-height:1.4; white-space:pre-wrap; }
    .msg.user { align-self:flex-end; background:var(--brand); color:#fff; border-bottom-right-radius:4px; }
    .msg.bot { align-self:flex-start; background:#eef0fb; color:#242424; border-bottom-left-radius:4px; }
    .msg.md { white-space:normal; }
    .msg.md p { margin:6px 0; } .msg.md p:first-child { margin-top:0; } .msg.md p:last-child { margin-bottom:0; }
    .msg.md ul, .msg.md ol { margin:6px 0; padding-left:20px; }
    .msg.md table { border-collapse:collapse; margin:8px 0; font-size:13px; }
    .msg.md th, .msg.md td { border:1px solid #c3c7e6; padding:4px 9px; text-align:left; }
    .msg.md th { background:#e2e5f7; }
    .msg.md code { background:#dde1f5; padding:1px 5px; border-radius:4px; font-size:13px; }
    .msg.md strong { font-weight:600; }
    .composer { display:flex; gap:8px; padding:12px 16px; border-top:1px solid #eee;
                position:sticky; bottom:0; background:var(--panel); }
    .composer input { flex:1; border:1px solid #d0d0d5; border-radius:20px; padding:10px 14px; font-size:14px; outline:none; }
    .composer input:focus { border-color:var(--brand); }
    .composer button { border:none; background:var(--brand); color:#fff; border-radius:20px; padding:10px 18px; font-size:14px; cursor:pointer; }
    .composer button:disabled { opacity:.5; cursor:not-allowed; }
    /* Adaptive Cards look */
    .ac-textBlock { margin:2px 0; }
    .ac-pushButton { border-radius:8px !important; padding:8px 16px !important; margin-right:8px !important;
                     cursor:pointer; border:1px solid #d0d0d5; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="avatar">A</div>
      <div>
        <h1>AION · Alert Aggregator</h1>
        <div class="sub">Self-healing approval demo · local k3s cluster</div>
      </div>
      <div class="toolbar">
        <button class="tool" id="btn-start">▶ Start scenario</button>
        <button class="tool" id="btn-reset">↺ Reset</button>
      </div>
    </header>
    <div id="feed">
      <div class="note">Click “Start scenario” for the scripted flow, or just chat below
        (e.g. “how is outsystem?”, “please fix the memory issue”).</div>
    </div>
    <div class="composer">
      <input id="chat-input" type="text" placeholder="Ask AION… e.g. how is outsystem?" autocomplete="off" />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <script>
    const feed = document.getElementById("feed");
    const btnStart = document.getElementById("btn-start");
    const btnReset = document.getElementById("btn-reset");

    function stamp() {
      const now = new Date();
      return now.getHours().toString().padStart(2, "0") + "." +
             now.getMinutes().toString().padStart(2, "0");
    }

    async function postJSON(path, body) {
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body || {})
      });
      return res.json();
    }

    function renderCard(cardJson) {
      const wrap = document.createElement("div");
      wrap.className = "bubble";

      const stampEl = document.createElement("div");
      stampEl.className = "stamp";
      stampEl.textContent = "AION · " + stamp();
      wrap.appendChild(stampEl);

      const cardBox = document.createElement("div");
      cardBox.className = "card-wrap";

      const adaptiveCard = new AdaptiveCards.AdaptiveCard();
      adaptiveCard.onExecuteAction = (action) => handleAction(action.data || {});
      adaptiveCard.parse(cardJson);
      cardBox.appendChild(adaptiveCard.render());

      wrap.appendChild(cardBox);
      feed.appendChild(wrap);
      wrap.scrollIntoView({ behavior: "smooth", block: "end" });
      return wrap;
    }

    function renderNote(text) {
      const note = document.createElement("div");
      note.className = "note";
      note.textContent = text;
      feed.appendChild(note);
      note.scrollIntoView({ behavior: "smooth", block: "end" });
      return note;
    }

    async function handleAction(data) {
      if (!data.verb) return;
      if (data.verb === "approve") {
        const working = renderNote("⏳ Approved — executing remediation on the cluster (rollout restart)…");
        const result = await postJSON("/api/demo/approve", { requestId: data.requestId });
        working.remove();
        if (result.card) renderCard(result.card);
      } else if (data.verb === "reject") {
        const result = await postJSON("/api/demo/reject", { requestId: data.requestId });
        if (result.card) renderCard(result.card);
      }
    }

    async function startScenario() {
      btnStart.disabled = true;
      feed.innerHTML = "";
      renderNote("① Auto healthcheck detected an issue…");
      const health = await postJSON("/api/demo/reset");
      renderCard(health.card);

      renderNote("② Recommended action requires approval…");
      const approval = await postJSON("/api/demo/request-approval");
      if (approval.pending) {
        renderCard(approval.card);
      } else {
        renderNote(approval.message || "No action needed.");
      }
      btnStart.disabled = false;
    }

    async function resetOnly() {
      feed.innerHTML = "";
      const health = await postJSON("/api/demo/reset");
      renderNote("Target reset to unhealthy (memory 85%).");
      renderCard(health.card);
    }

    // --- chat ---
    const chatInput = document.getElementById("chat-input");
    const chatSend = document.getElementById("chat-send");
    const sessionId = "web-" + Math.random().toString(36).slice(2);

    function renderMessage(text, who) {
      const el = document.createElement("div");
      el.className = "msg " + who;
      if (who === "bot" && window.marked) {
        el.classList.add("md");
        const html = window.marked.parse(text);
        el.innerHTML = window.DOMPurify ? window.DOMPurify.sanitize(html) : html;
      } else {
        el.textContent = text;
      }
      feed.appendChild(el);
      el.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    async function sendChat() {
      const message = chatInput.value.trim();
      if (!message) return;
      chatInput.value = "";
      chatSend.disabled = true;
      renderMessage(message, "user");
      const thinking = renderNote("AION is thinking…");
      try {
        const res = await postJSON("/api/demo/chat", { session_id: sessionId, message });
        thinking.remove();
        if (res.reply) renderMessage(res.reply, "bot");
        (res.cards || []).forEach(renderCard);
      } catch (e) {
        thinking.remove();
        renderMessage("Error contacting the agent.", "bot");
      } finally {
        chatSend.disabled = false;
        chatInput.focus();
      }
    }

    btnStart.addEventListener("click", startScenario);
    btnReset.addEventListener("click", resetOnly);
    chatSend.addEventListener("click", sendChat);
    chatInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });
  </script>
</body>
</html>
